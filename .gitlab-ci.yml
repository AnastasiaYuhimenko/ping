stages:
  - check_pr
  - deploy

variables:
  PYTHONPATH: "$CI_PROJECT_DIR"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  image: python:3.13
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .cache/pip
  before_script:
    - python -V
    - apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev && rm -rf /var/lib/apt/lists/*
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync

lint:
  stage: check_pr
  rules:
    - if: '$CI_MERGE_REQUEST_IID && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - uv run -- ruff check

test:
  stage: check_pr
  services:
    - name: postgres:18
      alias: postgres
  variables:
    POSTGRES_DB: test
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_TEST_DB: test_db
    SECRET_KEY: "test"
  rules:
    - if: '$CI_MERGE_REQUEST_IID && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - pip install uv
    - uv run -- pytest -q

deploy:
  stage: deploy
  image: alpine:3.22
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_ed25519
    - chmod 600 ~/.ssh/deploy_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - export DEPLOY_DIR="$DEPLOY_PATH/gpu-manager-backend"
    - ssh -i ~/.ssh/deploy_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p \"$DEPLOY_DIR\""
    - cat $PROD_ENV_FILE > .env
    - rsync -az --delete --exclude ".git" --exclude ".venv" --exclude "__pycache__" -e "ssh -i ~/.ssh/deploy_ed25519" ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/"
    - ssh -i ~/.ssh/deploy_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "cd \"$DEPLOY_DIR\" && chmod +x ./deploy.sh && ./deploy.sh"
